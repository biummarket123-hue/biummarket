name: Supabase DB 자동 백업

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 새벽 3시 (한국시간, UTC+9 기준)
  workflow_dispatch:       # 수동 실행 버튼도 추가

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설치
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Supabase CLI 설치
        run: npm install -g supabase

      - name: 백업 폴더 생성
        run: mkdir -p backups

      - name: DB 백업 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          node -e "
          const https = require('https');
          const fs = require('fs');

          const tables = ['board_posts', 'products', 'reservations', 'users'];

          tables.forEach(table => {
            const url = new URL(process.env.SUPABASE_URL + '/rest/v1/' + table + '?select=*');
            const options = {
              hostname: url.hostname,
              path: url.pathname + url.search,
              headers: {
                'apikey': process.env.SUPABASE_KEY,
                'Authorization': 'Bearer ' + process.env.SUPABASE_KEY
              }
            };
            https.get(options, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                fs.writeFileSync('backups/' + table + '_${DATE}.json', data);
                console.log(table + ' 백업 완료');
              });
            });
          });
          "

      - name: 백업 파일 커밋 & 푸시
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@biummarket.com"
          git add backups/
          git diff --staged --quiet || git commit -m "🗄️ DB 자동 백업 $(date +%Y-%m-%d)"
          git push