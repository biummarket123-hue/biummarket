name: Supabase DB 자동 백업

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 백업 폴더 생성
        run: mkdir -p backups

      - name: DB 백업 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          for TABLE in board_posts products reservations users; do
            curl -s \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*" \
              -o "backups/${TABLE}_${DATE}.json"
            echo "${TABLE} 백업 완료"
          done

      - name: 백업 파일 커밋 & 푸시
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@biummarket.com"
          git add backups/
          git diff --staged --quiet || git commit -m "DB 자동 백업 $(date +%Y-%m-%d)"
          git push